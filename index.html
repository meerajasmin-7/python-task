<!DOCTYPE html>
<html>
<head>
    <title>MJ Restaurant Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f3e7;
            text-align: center;
        }

        .menu {
            width: 60%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            color: darkred;
        }

        h2 {
            color: green;
            border-bottom: 2px solid green;
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            margin-top: 10px;
        }

        td {
            padding: 8px;
            font-size: 18px;
        }

        .price {
            text-align: right;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="menu">
    <h1> MJ Restaurant </h1>
    <p>Menu Card</p>

    <h2>Starters</h2>
    <table>
        <tr><td>Veg Manchurian</td><td class="price">₹120</td></tr>
        <tr><td>Chicken 65</td><td class="price">₹180</td></tr>
        <tr><td>Paneer Tikka</td><td class="price">₹160</td></tr>
    </table>

    <h2>Rice</h2>
    <table>
        <tr><td>Veg Biryani</td><td class="price">₹180</td></tr>
        <tr><td>Chicken Biryani</td><td class="price">₹250</td></tr>
        <tr><td>Butter Naan</td><td class="price">₹40</td></tr>
        <tr><td>Mutton Biryani</td><td class="price">₹300</td></tr>
    </table>

    <h2>Beverages</h2>
    <table>
        <tr><td>Tea</td><td class="price">₹20</td></tr>
        <tr><td>Coffee</td><td class="price">₹30</td></tr>
        <tr><td>cold Coffee</td><td class="price">₹80</td></tr>
        <tr><td>Soft Drink</td><td class="price">₹50</td></tr>
    </table>

    <h2>Desserts</h2>
    <table>
        <tr><td>Ice Cream</td><td class="price">₹80</td></tr>
        <tr><td>Gulab Jamun</td><td class="price">₹60</td></tr>
        <tr><td>kadu kheer</td><td class="price">₹60</td></tr>

    </table>
</div>

</body>
</html>
